<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Label drucken</title>
  <style>
    /* WICHTIG: Keine @page-Regel — sonst kollidiert die Eltern-Seite mit der
       PDF-Eigengröße im Iframe und der Druck wird auf mehrere Blätter aufgeteilt.
       Chrome verwendet beim iframe.contentWindow.print() automatisch die
       PDF-Seitengröße. Falls diese nicht zum Drucker-Papier passt, sollte das
       Label-Format in den Optionen umgestellt werden. */

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; background: #2D2D2D; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

    .toolbar {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      background: rgba(255,255,255,0.95); color: #1A1A1A;
      padding: 8px; border-radius: 8px; display: flex; gap: 6px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    }
    .toolbar button {
      padding: 8px 14px; font-size: 13px; font-weight: 600;
      border: 1px solid #ccc; border-radius: 6px; background: #fff;
      color: #1A1A1A; cursor: pointer;
    }
    .toolbar button.primary { background: #FFCC00; border-color: #E6B800; }
    .toolbar button:hover { background: #f0f0f0; }
    .toolbar button.primary:hover { background: #FFD633; }

    #pdf-frame { display: block; border: 0; background: #fff; width: 100%; height: 100vh; }
    .empty { padding: 40px; text-align: center; }

    @media print {
      .toolbar { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="primary" id="btn-print">🖨 Drucken</button>
    <button id="btn-close">✕ Schließen</button>
  </div>
  <iframe id="pdf-frame" title="Versandlabel"></iframe>
  <script src="print.js"></script>
</body>
</html>
